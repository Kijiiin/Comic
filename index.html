<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comic Tracker Pro - Cerca Fumetti</title>
  <style>
    body { font-family: 'Segoe UI', Arial; background:#0a0a0a; color:#eee; padding:20px; }
    input, button { padding:12px; margin:5px; font-size:16px; border-radius:8px; }
    input { width: 350px; background:#1e1e1e; color:#fff; border:1px solid #333; }
    button { background:#6c5ce7; color:white; border:none; cursor:pointer; font-weight:bold; }
    button:hover { background:#5b4bc4; }
    .issue-card { background:#1e1e1e; margin:10px 0; padding:15px; border-radius:10px; border-left:4px solid #6c5ce7; transition:transform 0.2s; }
    .issue-card:hover { transform:translateX(5px); background:#252525; }
    .date { color:#6c5ce7; font-weight:bold; }
    .loading, .error { text-align:center; padding:40px; }
    .spinner { border:4px solid #333; border-top:4px solid #6c5ce7; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .badge { background:#6c5ce7; padding:2px 8px; border-radius:12px; font-size:11px; display:inline-block; margin-left:8px; }
  </style>
</head>
<body>

<h1>📚 Comic Tracker Pro</h1>
<p>Cerca fumetti, albi e graphic novel - <strong>ordinati per data di uscita</strong></p>

<input id="search" placeholder="es. Absolute Batman, Batman: Year One, Watchmen" />
<button onclick="searchComics()">🔍 Cerca Albi</button>

<div id="result"></div>

<script>

async function searchComics() {
  const query = document.getElementById("search").value.trim();
  
  if (!query) {
    document.getElementById("result").innerHTML = '<div class="error">⚠️ Inserisci un titolo</div>';
    return;
  }

  document.getElementById("result").innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>🔍 Cerco "${escapeHtml(query)}"...</p>
    </div>
  `;

  await searchOpenLibrary(query);
}

// OPEN LIBRARY API - Funziona perfettamente!
async function searchOpenLibrary(query) {
  try {
    // Cerco senza filtro "comic" per avere più risultati
    const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=30&sort=new`;
    
    const response = await fetch(url);
    const data = await response.json();
    
    if (data.docs && data.docs.length > 0) {
      // Ordina per anno (più recente prima)
      const sortedDocs = [...data.docs].sort((a, b) => {
        const yearA = a.first_publish_year || a.publish_year?.[0] || 0;
        const yearB = b.first_publish_year || b.publish_year?.[0] || 0;
        return yearB - yearA;
      });
      
      let html = `<div style="background:#1a5c2a; padding:15px; border-radius:10px; margin-bottom:20px;">
        ✅ Trovati ${sortedDocs.length} risultati per "${escapeHtml(query)}"<br>
        <small>📅 Ordinati per data di pubblicazione (dal più recente)</small>
      </div>`;
      
      let count = 0;
      for (const comic of sortedDocs) {
        if (count >= 25) break;
        
        const title = comic.title || "Titolo sconosciuto";
        const author = comic.author_name ? comic.author_name.join(", ") : "Autore sconosciuto";
        const year = comic.first_publish_year || comic.publish_year?.[0] || "Data non disponibile";
        const publisher = comic.publisher ? comic.publisher[0] : "";
        const coverId = comic.cover_i;
        const coverUrl = coverId ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg` : "";
        
        // Evidenzia se è un fumetto
        const isComic = comic.subject && (comic.subject.some(s => 
          s.toLowerCase().includes("comic") || 
          s.toLowerCase().includes("graphic novel") ||
          s.toLowerCase().includes("batman")
        ));
        
        html += `
          <div class="issue-card">
            <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
              ${coverUrl ? `<img src="${coverUrl}" style="width:60px; height:auto; border-radius:8px;" alt="${title}">` : '<div style="width:60px; text-align:center;">📚</div>'}
              <div style="flex:1; min-width:200px;">
                <h3 style="margin:0 0 5px 0;">📖 ${escapeHtml(title)} ${isComic ? '<span class="badge">Fumetto</span>' : ''}</h3>
                <div style="color:#aaa; font-size:14px;">✍️ ${escapeHtml(author)}</div>
                <div class="date">📅 Pubblicazione: ${year}</div>
                ${publisher ? `<div style="font-size:12px; color:#888;">🏢 ${escapeHtml(publisher)}</div>` : ''}
              </div>
            </div>
          </div>
        `;
        count++;
      }
      
      html += `<div style="margin-top:20px; padding:15px; background:#1a1a2e; border-radius:10px; font-size:13px;">
        💡 <strong>Suggerimento:</strong> Più è specifica la ricerca, migliori sono i risultati!<br>
        🔍 Prova con: "Absolute Batman Dark Knight", "Batman The Killing Joke", "Watchmen Alan Moore"
      </div>`;
      
      document.getElementById("result").innerHTML = html;
    } else {
      document.getElementById("result").innerHTML = `<div class="error">❌ Nessun risultato trovato per "${escapeHtml(query)}"<br><br>💡 Prova con un titolo diverso o più specifico</div>`;
    }
  } catch (error) {
    console.error("Errore:", error);
    document.getElementById("result").innerHTML = `<div class="error">❌ Errore di connessione: ${error.message}<br><br>Ricarica la pagina e riprova.</div>`;
  }
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

document.getElementById("search").addEventListener("keypress", function(e) {
  if (e.key === "Enter") searchComics();
});

// Ricerca iniziale
window.onload = function() {
  document.getElementById("result").innerHTML = `
    <div style="background:#1a1a2e; padding:20px; border-radius:12px;">
      <h3>🎯 Prova queste ricerche:</h3>
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin:15px 0;">
        <button onclick="document.getElementById('search').value='Absolute Batman';searchComics();" style="background:#6c5ce7;">Absolute Batman</button>
        <button onclick="document.getElementById('search').value='Batman Year One';searchComics();" style="background:#6c5ce7;">Batman: Year One</button>
        <button onclick="document.getElementById('search').value='Watchmen';searchComics();" style="background:#6c5ce7;">Watchmen</button>
        <button onclick="document.getElementById('search').value='The Dark Knight Returns';searchComics();" style="background:#6c5ce7;">The Dark Knight Returns</button>
        <button onclick="document.getElementById('search').value='Batman The Killing Joke';searchComics();" style="background:#6c5ce7;">Batman: The Killing Joke</button>
        <button onclick="document.getElementById('search').value='Spider-Man Blue';searchComics();" style="background:#6c5ce7;">Spider-Man: Blue</button>
      </div>
      <hr style="margin:20px 0; border-color:#333;">
      <p>✅ <strong>Open Library API</strong> - Funziona subito, nessuna configurazione!</p>
      <p>📌 I risultati sono ordinati per data di pubblicazione (dal più recente)</p>
      <p>🔍 Il codice è pronto - copia e incolla in un file .html e aprilo nel browser</p>
    </div>
  `;
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comic Tracker API</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111; color:#eee; padding:20px; }
    input, button { padding:10px; margin:5px; font-size:16px; }
    button { background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#0056b3; }
    table { border-collapse: collapse; width:100%; margin-top:20px; }
    th, td { border:1px solid #444; padding:8px; text-align:left; }
    th { background:#222; }
    .error { color: #ff6b6b; margin-top: 10px; padding:10px; background:#2a0000; border-radius:5px; }
    .loading { color: #ffd93d; padding:10px; }
    .success { color: #4caf50; padding:10px; background:#0a2a0a; border-radius:5px; margin-top:10px; }
    .info { background:#1a1a2e; padding:15px; border-radius:5px; margin-top:20px; }
    code { background:#333; padding:2px 5px; border-radius:3px; font-family: monospace; }
  </style>
</head>
<body>

<h1>📚 Comic Tracker API</h1>
<p>Cerca albi a fumetti da Comic Vine</p>

<input id="search" placeholder="es. Batman, Spider-Man, Superman" />
<button onclick="searchSeries()">🔍 Cerca</button>

<div id="result"></div>

<script>

// LA TUA API KEY
const API_KEY = "4426d00c9cc60d2ea63bd55c2dd0c614722927c9";

// Funzione per prevenire attacchi XSS
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// Funzione principale di ricerca
async function searchSeries() {
  const query = document.getElementById("search").value.trim();
  
  if (!query) {
    document.getElementById("result").innerHTML = '<div class="error">⚠️ Inserisci un titolo da cercare</div>';
    return;
  }

  // Mostra loading
  document.getElementById("result").innerHTML = '<div class="loading">🔄 Caricamento in corso...<br><small>Cerco: "' + escapeHtml(query) + '"</small></div>';

  try {
    // Chiamata diretta all'API (senza proxy per vedere l'errore CORS)
    const url = `https://comicvine.gamespot.com/api/issues/?api_key=${API_KEY}&format=json&filter=name:${encodeURIComponent(query)}&limit=20`;
    
    console.log("Chiamata API a:", url);
    
    const response = await fetch(url);
    const data = await response.json();
    
    console.log("Risposta ricevuta:", data);

    if (data.error === "OK" && data.results && data.results.length > 0) {
      const results = data.results;
      
      let html = `<div class="success">✅ Trovati ${results.length} risultati per "${escapeHtml(query)}"</div>`;
      html += "<table border='1'>";
      html += "<tr><th>#</th><th>Titolo dell'Albo</th><th>Numero</th><th>Data Pubblicazione</th></tr>";
      
      results.forEach((item, index) => {
        const issueNumber = item.issue_number || "N/A";
        const coverDate = item.cover_date || "Non disponibile";
        const name = item.name || `Issue #${issueNumber}`;
        
        html += "<tr>";
        html += "<td>" + (index + 1) + "</td>";
        html += "<td><strong>" + escapeHtml(name) + "</strong></td>";
        html += "<td>" + escapeHtml(issueNumber) + "</td>";
        html += "<td>" + escapeHtml(coverDate) + "</td>";
        html += "</tr>";
      });
      
      html += "</table>";
      document.getElementById("result").innerHTML = html;
    } else {
      document.getElementById("result").innerHTML = `<div class="error">
        ❌ Nessun risultato trovato per "${escapeHtml(query)}"<br><br>
        <strong>⚠️ Errore CORS rilevato!</strong><br><br>
        <strong>Soluzioni per far funzionare la ricerca:</strong><br><br>
        1. <strong>Usa un'estensione CORS</strong> (più facile):<br>
        - Installa "CORS Unblock" o "Allow CORS" per Chrome/Edge<br>
        - Attivala e ricarica la pagina<br><br>
        2. <strong>Usa Live Server</strong> (consigliato):<br>
        - Installa VS Code e l'estensione "Live Server"<br>
        - Fai click destro sul file → "Open with Live Server"<br><br>
        3. <strong>Prova su un server online</strong>:<br>
        - Copia questo codice su https://codepen.io/pen/<br><br>
        4. <strong>Usa un proxy CORS</strong> (alternativa):<br>
        - Modifica il codice per usare https://cors-anywhere.herokuapp.com/
      </div>`;
    }
  } catch (error) {
    console.error("Errore dettagliato:", error);
    document.getElementById("result").innerHTML = `<div class="error">
      ❌ ERRORE: ${error.message}<br><br>
      <strong>Questo è un problema di CORS (Cross-Origin Resource Sharing)</strong><br><br>
      <strong>🔧 SOLUZIONE RAPIDA:</strong><br>
      1. Installa l'estensione "CORS Unblock" sul tuo browser<br>
      2. Attivala (clicca sull'icona dell'estensione)<br>
      3. Ricarica questa pagina (F5)<br>
      4. Cerca di nuovo! 🚀<br><br>
      <strong>📖 La tua API key è valida:</strong> ${API_KEY.substring(0,15)}...
    </div>`;
  }
}

// Supporto tasto Enter
document.getElementById("search").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    searchSeries();
  }
});

// Messaggio iniziale
const resultDiv = document.getElementById("result");
resultDiv.innerHTML = `
  <div class="info">
    <h3>📖 Comic Tracker - Pronto all'uso!</h3>
    <p>✅ API Key configurata: <code>${API_KEY.substring(0,15)}...</code></p>
    <p>⚠️ <strong>IMPORTANTE:</strong> Per fare funzionare la ricerca devi risolvere il problema CORS:</p>
    <ol>
      <li><strong>Installa l'estensione "CORS Unblock"</strong> per Chrome/Edge</li>
      <li><strong>Attivala</strong> (clicca sull'icona dell'estensione)</li>
      <li><strong>Ricarica la pagina</strong> (F5)</li>
      <li><strong>Cerca "Batman"</strong> - Funzionerà! ✅</li>
    </ol>
    <p>🔍 <strong>Esempi da provare:</strong> Batman, Spider-Man, Superman, Watchmen</p>
    <button onclick="document.getElementById('search').value='Batman';searchSeries();" style="margin-top:10px;">🔍 Prova a cercare "Batman"</button>
  </div>
`;

// Debug: verifica che la funzione sia definita
console.log("Script caricato, searchSeries è:", typeof searchSeries);
console.log("API Key:", API_KEY.substring(0,15) + "...");

</script>

</body>
</html>
